<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birria Manager PRO</title>
<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#2b2b2b;
color:white;
}

.header{
background:#7a1e1e;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.main{
display:flex;
height:calc(100vh - 60px);
}

.left{
width:60%;
padding:10px;
display:flex;
flex-wrap:wrap;
align-content:flex-start;
overflow:auto;
}

.right{
width:40%;
background:#3a3a3a;
padding:15px;
display:flex;
flex-direction:column;
}

.product{
width:30%;
margin:1%;
padding:20px;
border-radius:12px;
font-size:18px;
font-weight:bold;
border:none;
color:white;
cursor:pointer;
}

.taco{background:#c0392b;}
.quesa{background:#d35400;}
.consome{background:#16a085;}
.ramen{background:#8e44ad;}
.media{background:#2980b9;}
.combo{background:#f39c12;}

.ticket{
flex:1;
background:#222;
border-radius:10px;
padding:10px;
overflow:auto;
margin-top:10px;
}

.total{
font-size:26px;
margin-top:10px;
font-weight:bold;
}

button{
padding:12px;
margin-top:5px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.pay{
background:#27ae60;
color:white;
}

.transfer{
background:#3498db;
color:white;
}

.clear{
background:#c0392b;
color:white;
}

.tabs{
display:flex;
overflow:auto;
margin-bottom:10px;
}

.tab{
background:#555;
padding:8px 12px;
border-radius:8px;
margin-right:5px;
cursor:pointer;
}

.active{
background:#f39c12;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
width:100%;
}

.item{
display:flex;
justify-content:space-between;
margin:5px 0;
}

.historyBtn{
background:#9b59b6;
color:white;
margin-top:5px;
}

</style>
</head>
<body>
<div class="header">🌮 Birria Manager PRO</div>
<div class="main">
<div class="left">

</div>
<div class="right">
<div class="tabs" id="tabs"></div>
<input id="clienteNombre" placeholder="Nombre del cliente">
<div class="ticket" id="ticket"></div>
<div class="total">
Total: $<span id="total">0</span>
</div>
</div>

</div>
<script>

let cuentas = [];
let cuentaActiva = 0;

function nuevaCuenta(){
let cuenta = {
cliente:"",
items:[],
total:0
};
cuentas.push(cuenta);
cuentaActiva = cuentas.length -1;
renderTabs();
render();
}

function renderTabs(){
let html="";
cuentas.forEach((c,i)=>{
html+=`<div class="tab ${i===cuentaActiva?'active':''}" onclick="cambiarCuenta(${i})">
Cuenta ${i+1}
</div>`;
});
document.getElementById("tabs").innerHTML = html;
}

function cambiarCuenta(i){
cuentaActiva = i;
render();
renderTabs();
}

function addItem(nombre,precio){
let cuenta = cuentas[cuentaActiva];
let existente = cuenta.items.find(i=>i.nombre===nombre);

if(existente){
existente.cantidad++;
}else{
cuenta.items.push({nombre,precio,cantidad:1});
}

cuenta.total += precio;
render();
}

function render(){
let cuenta = cuentas[cuentaActiva];
document.getElementById("clienteNombre").value = cuenta.cliente;

let html="";
cuenta.items.forEach((item,index)=>{
html+=`
<div class="item">
<div>${item.cantidad}x ${item.nombre}</div>
<div>$${item.precio * item.cantidad}</div>
</div>
`;
});

document.getElementById("ticket").innerHTML = html;
document.getElementById("total").innerText = cuenta.total;
}

document.getElementById("clienteNombre").addEventListener("input",function(){
cuentas[cuentaActiva].cliente = this.value;
});

function cobrar(metodo){

let cuenta = cuentas[cuentaActiva];

if(cuenta.total===0) return;

guardarVenta(cuenta,metodo);

alert("Pagado con "+metodo+" — Total $"+cuenta.total);

cuentas.splice(cuentaActiva,1);

if(cuentas.length===0) nuevaCuenta();
else cuentaActiva=0;

renderTabs();
render();

}

function guardarVenta(cuenta,metodo){

let historial = JSON.parse(localStorage.getItem("historialBirria")||"[]");

historial.push({
cliente:cuenta.cliente,
total:cuenta.total,
metodo:metodo,
fecha:new Date().toLocaleString()
});

localStorage.setItem("historialBirria",JSON.stringify(historial));

}

function verHistorial(){

let historial = JSON.parse(localStorage.getItem("historialBirria")||"[]");

let texto="HISTORIAL:\n\n";

historial.forEach(h=>{
texto+=`${h.fecha} - ${h.cliente} - $${h.total} (${h.metodo})\n`;
});

alert(texto || "Sin ventas");

}

nuevaCuenta();

</script>
</body>
</html>
