<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birria Manager</title>

<style>
body{
 font-family: Arial;
 margin:0;
 background:#121212;
 color:white;
}

.header{
 background:#8B0000;
 padding:15px;
 text-align:center;
 font-size:24px;
 font-weight:bold;
}

.container{
 padding:15px;
}

button{
 padding:12px;
 margin:5px;
 font-size:16px;
 border:none;
 border-radius:10px;
}

.product{
 background:#1f1f1f;
 color:white;
}

.total{
 font-size:24px;
 margin-top:10px;
}

.status{
 margin-top:10px;
 font-size:18px;
}

.cuenta{
 background:#1f1f1f;
 padding:10px;
 margin:5px 0;
 border-radius:10px;
}
</style>

</head>
<body>

<div class="header">🌮 Birria Manager</div>

<div class="container">

<input id="cliente" placeholder="Nombre cliente" style="padding:10px;font-size:18px;width:100%;">

<h3>Productos</h3>

<button class="product" onclick="add(40)">Taco $40</button>
<button class="product" onclick="add(60)">Quesabirria $60</button>
<button class="product" onclick="add(20)">Consomé $20</button>
<button class="product" onclick="add(120)">Birriamen $120</button>
<button class="product" onclick="add(120)">Media orden $120</button>

<h3>Combos</h3>

<button class="product" onclick="add(110)">Taquisa $110</button>
<button class="product" onclick="add(120)">Quesalover $120</button>
<button class="product" onclick="add(220)">Hambreado $220</button>

<div class="total">
Total: $<span id="total">0</span>
</div>

<div class="status">
Estado: <span id="estado">Pendiente</span>
</div>

<br>

<button onclick="cobrar('Efectivo')">Cobrar Efectivo</button>
<button onclick="cobrar('Transferencia')">Cobrar Transferencia</button>
<button onclick="guardarCuenta()">Guardar Cuenta</button>
<button onclick="reset()">Nueva Cuenta</button>

<h3>Cuentas Guardadas</h3>
<div id="cuentas"></div>

<h3>Corte del Día</h3>
<button onclick="verCorte()">Ver Corte</button>
<div id="corte"></div>

</div>

<script>

let total = 0;

function add(precio){
 total += precio;
 document.getElementById("total").innerText = total;
}

function cobrar(metodo){

 document.getElementById("estado").innerText = "Pagado";

 let ventas = JSON.parse(localStorage.getItem("ventas") || "[]");

 ventas.push({
 cliente: document.getElementById("cliente").value,
 total: total,
 metodo: metodo,
 fecha: new Date().toLocaleDateString()
 });

 localStorage.setItem("ventas", JSON.stringify(ventas));

 alert("Pagado con " + metodo + " — Total $" + total);

 reset();
}

function guardarCuenta(){

 let cuentas = JSON.parse(localStorage.getItem("cuentas") || "[]");

 cuentas.push({
 cliente: document.getElementById("cliente").value,
 total: total
 });

 localStorage.setItem("cuentas", JSON.stringify(cuentas));

 mostrarCuentas();
 reset();
}

function mostrarCuentas(){

 let cuentas = JSON.parse(localStorage.getItem("cuentas") || "[]");

 let html = "";

 cuentas.forEach((c,i)=>{
  html += `
   <div class="cuenta">
    ${c.cliente} — $${c.total}
    <button onclick="recuperar(${i})">Recuperar</button>
   </div>
  `;
 });

 document.getElementById("cuentas").innerHTML = html;
}

function recuperar(i){

 let cuentas = JSON.parse(localStorage.getItem("cuentas") || "[]");

 document.getElementById("cliente").value = cuentas[i].cliente;
 total = cuentas[i].total;

 document.getElementById("total").innerText = total;

 cuentas.splice(i,1);

 localStorage.setItem("cuentas", JSON.stringify(cuentas));

 mostrarCuentas();
}

function reset(){
 total = 0;
 document.getElementById("total").innerText = total;
 document.getElementById("estado").innerText = "Pendiente";
 document.getElementById("cliente").value = "";
}

function verCorte(){

 let ventas = JSON.parse(localStorage.getItem("ventas") || "[]");

 let hoy = new Date().toLocaleDateString();

 let totalDia = 0;
 let html = "";

 ventas.forEach(v=>{
  if(v.fecha === hoy){
   totalDia += v.total;
   html += `${v.cliente} — $${v.total} (${v.metodo}) <br>`;
  }
 });

 html += "<hr>Total del día: $" + totalDia;
 html += `<br><button onclick="eliminarDia('${hoy}')">Eliminar Día</button>`;

 document.getElementById("corte").innerHTML = html;
}

function eliminarDia(fecha){

 let ventas = JSON.parse(localStorage.getItem("ventas") || "[]");

 ventas = ventas.filter(v => v.fecha !== fecha);

 localStorage.setItem("ventas", JSON.stringify(ventas));

 verCorte();
}

mostrarCuentas();

</script>

</body>
</html>
