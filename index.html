<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birria Manager</title>

<style>

body{
 font-family: Arial, sans-serif;
 margin:0;
 background:#0d0d0d;
 color:white;
}

.header{
 background:#8B0000;
 padding:15px;
 text-align:center;
 font-size:22px;
 font-weight:bold;
}

.container{
 padding:10px;
}

.tabs{
 display:flex;
 overflow-x:auto;
 margin-bottom:10px;
}

.tab{
 background:#1c1c1c;
 padding:10px 15px;
 margin-right:5px;
 border-radius:10px;
 cursor:pointer;
}

.active{
 background:#b30000;
}

.products{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

button{
 padding:18px;
 font-size:18px;
 border:none;
 border-radius:12px;
}

.product{
 background:#1f1f1f;
 color:white;
}

.actions{
 background:#b30000;
 color:white;
}

.total{
 font-size:32px;
 font-weight:bold;
 text-align:center;
 margin:10px 0;
}

.ticket{
 background:#1c1c1c;
 padding:15px;
 border-radius:12px;
 margin-top:10px;
}

.login{
 position:fixed;
 top:0;
 left:0;
 right:0;
 bottom:0;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}

.hidden{
 display:none;
}

input{
 padding:12px;
 font-size:18px;
 border-radius:10px;
 border:none;
 width:100%;
 margin-bottom:10px;
}

</style>

</head>
<body>

<div id="login" class="login">
<h2>🔐 Birria Manager</h2>
<input type="password" id="pass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div id="app" class="hidden">

<div class="header">🌮 Birria Manager</div>

<div class="container">

<input id="cliente" placeholder="Nombre cliente">

<div class="tabs" id="tabs"></div>

<div class="products">

<button class="product" onclick="add(40)">Taco $40</button>
<button class="product" onclick="add(60)">Quesabirria $60</button>
<button class="product" onclick="add(20)">Consomé $20</button>
<button class="product" onclick="add(120)">Birriamen $120</button>
<button class="product" onclick="add(120)">Media orden $120</button>
<button class="product" onclick="add(110)">Taquisa $110</button>
<button class="product" onclick="add(120)">Quesalover $120</button>
<button class="product" onclick="add(220)">Hambreado $220</button>

</div>

<div class="total">
$<span id="total">0</span>
</div>

<button class="actions" onclick="nuevaCuenta()">Nueva Cuenta</button>
<button class="actions" onclick="cobrar('Efectivo')">Efectivo</button>
<button class="actions" onclick="cobrar('Transferencia')">Transferencia</button>

<div id="ticket" class="ticket hidden"></div>

</div>

</div>

<script>

let PASSWORD = "1234";

let cuentas = [];
let cuentaActual = null;

function login(){

 let p = document.getElementById("pass").value;

 if(p === PASSWORD){
  document.getElementById("login").style.display="none";
  document.getElementById("app").classList.remove("hidden");
 }else{
  alert("Contraseña incorrecta");
 }

}

function nuevaCuenta(){

 let nombre = document.getElementById("cliente").value || "Cliente";

 let cuenta = {
  nombre:nombre,
  total:0
 };

 cuentas.push(cuenta);

 cuentaActual = cuentas.length-1;

 renderTabs();
 actualizar();
}

function renderTabs(){

 let html="";

 cuentas.forEach((c,i)=>{

  html += `<div class="tab ${i===cuentaActual?'active':''}" onclick="cambiar(${i})">
  ${c.nombre} $${c.total}
  </div>`;

 });

 document.getElementById("tabs").innerHTML = html;
}

function cambiar(i){

 cuentaActual=i;
 actualizar();
 renderTabs();
}

function add(precio){

 if(cuentaActual===null){
  alert("Primero crea cuenta");
  return;
 }

 cuentas[cuentaActual].total += precio;

 actualizar();
 renderTabs();
}

function actualizar(){

 if(cuentaActual!==null){
  document.getElementById("total").innerText = cuentas[cuentaActual].total;
 }

}

function cobrar(metodo){

 if(cuentaActual===null) return;

 let c = cuentas[cuentaActual];

 mostrarTicket(c.nombre,metodo,c.total);

 cuentas.splice(cuentaActual,1);

 cuentaActual=null;

 renderTabs();

 document.getElementById("total").innerText = 0;

}

function mostrarTicket(cliente,metodo,total){

 let div = document.getElementById("ticket");

 div.innerHTML = `
  <h3>🧾 Ticket</h3>
  Cliente: ${cliente}<br>
  Total: $${total}<br>
  Pago: ${metodo}<br>
  ✅ Gracias por su compra
 `;

 div.classList.remove("hidden");

}

</script>

</body>
</html>
