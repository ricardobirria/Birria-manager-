<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birria Manager</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f8;
margin:0;
padding:10px;
}

h1{
text-align:center;
color:#8B0000;
}

.container{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.panel{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:10px;
margin:4px;
border:none;
border-radius:8px;
background:#8B0000;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#a30000;
}

.product{
background:#eee;
}

.client{
border:2px solid #ddd;
padding:8px;
margin-bottom:8px;
border-radius:8px;
}

.paid{
border-color:green;
background:#f0fff0;
}

.total{
font-size:18px;
font-weight:bold;
color:#8B0000;
}

.small{
font-size:12px;
color:#555;
}

input{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<h1>🌮 Birria Manager</h1>

<div class="container">

<div class="panel">

<h3>Nuevo Cliente</h3>

<input id="clientName" placeholder="Nombre cliente">
<button onclick="addClient()">Agregar</button>

<h3>Productos</h3>

<button class="product" onclick="addItem('Taco',40)">Taco $40</button>
<button class="product" onclick="addItem('Quesabirria',60)">Quesabirria $60</button>
<button class="product" onclick="addItem('Consomé',20)">Consomé $20</button>
<button class="product" onclick="addItem('Birriamen',120)">Birriamen $120</button>
<button class="product" onclick="addItem('Media Orden',120)">Media Orden $120</button>

<h3>Combos</h3>

<button onclick="addItem('Taquisa',110)">Taquisa $110</button>
<button onclick="addItem('Quesalover',120)">Quesalover $120</button>
<button onclick="addItem('Hambreado',220)">Hambreado $220</button>

</div>

<div class="panel" style="flex:1">

<h3>Clientes</h3>
<div id="clients"></div>

</div>

</div>

<div class="panel">
<h3>Historial</h3>
<button onclick="clearHistory()">Borrar historial del día</button>
<div id="history"></div>
</div>

<script>

let clients = []
let selectedClient = null

function saveData(){
localStorage.setItem("birriaClients",JSON.stringify(clients))
}

function loadData(){
let data = localStorage.getItem("birriaClients")
if(data) clients = JSON.parse(data)
render()
renderHistory()
}

function addClient(){
let name = document.getElementById("clientName").value
if(!name) return

clients.push({
name,
items:[],
total:0,
paid:false,
method:"",
date:new Date().toLocaleDateString()
})

document.getElementById("clientName").value=""
saveData()
render()
}

function selectClient(index){
selectedClient=index
render()
}

function addItem(name,price){
if(selectedClient===null) return alert("Selecciona cliente")

let c=clients[selectedClient]

c.items.push({name,price})
c.total+=price

saveData()
render()
}

function togglePaid(index){

let method = prompt("Metodo de pago: efectivo / transferencia")

clients[index].paid=true
clients[index].method=method

saveData()
render()
renderHistory()
}

function editName(index){

let newName=prompt("Nuevo nombre",clients[index].name)
if(newName) clients[index].name=newName

saveData()
render()
}

function render(){

let div=document.getElementById("clients")
div.innerHTML=""

clients.forEach((c,i)=>{

let el=document.createElement("div")
el.className="client "+(c.paid?"paid":"")

el.innerHTML=`
<b>${c.name}</b> 
<button onclick="editName(${i})">✏️</button>
<br>

${c.items.map(it=>`• ${it.name} $${it.price}`).join("<br>")}

<br><span class="total">Total: $${c.total}</span>
<br><span class="small">${c.paid?"Pagado ("+c.method+")":"Pendiente"}</span>
<br>

<button onclick="selectClient(${i})">Seleccionar</button>
<button onclick="togglePaid(${i})">Marcar Pagado</button>
`

div.appendChild(el)

})

}

function renderHistory(){

let div=document.getElementById("history")

let history=clients.filter(c=>c.paid)

div.innerHTML=history.map(h=>
`<div>
${h.date} - ${h.name} - $${h.total} (${h.method})
</div>`
).join("")
}

function clearHistory(){

if(confirm("Borrar historial?")){

clients=[]
saveData()
render()
renderHistory()

}

}

loadData()

</script>

</body>
</html>
