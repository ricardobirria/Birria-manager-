<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birria Manager</title>

<style>

body{
 font-family: Arial, sans-serif;
 margin:0;
 background:#0f0f0f;
 color:white;
}

.header{
 background:linear-gradient(90deg,#8B0000,#b30000);
 padding:15px;
 text-align:center;
 font-size:24px;
 font-weight:bold;
}

.container{
 padding:15px;
}

input{
 padding:12px;
 font-size:18px;
 width:100%;
 border-radius:10px;
 border:none;
 margin-bottom:10px;
}

button{
 padding:15px;
 margin:5px;
 font-size:18px;
 border:none;
 border-radius:12px;
}

.product{
 background:#1f1f1f;
 color:white;
 width:48%;
}

.actions{
 background:#8B0000;
 color:white;
 width:48%;
}

.total{
 font-size:28px;
 margin-top:10px;
 font-weight:bold;
}

.status{
 margin-top:10px;
 font-size:18px;
}

.ticket{
 background:#1c1c1c;
 padding:15px;
 border-radius:12px;
 margin-top:15px;
}

.hidden{
 display:none;
}

.login{
 position:fixed;
 top:0;
 left:0;
 right:0;
 bottom:0;
 background:#000;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}

</style>

</head>
<body>

<div id="login" class="login">
<h2>🔐 Birria Manager</h2>
<input type="password" id="pass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div id="app" class="hidden">

<div class="header">🌮 Birria Manager</div>

<div class="container">

<input id="cliente" placeholder="Nombre cliente">

<h3>Productos</h3>

<button class="product" onclick="add(40)">Taco $40</button>
<button class="product" onclick="add(60)">Quesabirria $60</button>
<button class="product" onclick="add(20)">Consomé $20</button>
<button class="product" onclick="add(120)">Birriamen $120</button>
<button class="product" onclick="add(120)">Media orden $120</button>

<h3>Combos</h3>

<button class="product" onclick="add(110)">Taquisa $110</button>
<button class="product" onclick="add(120)">Quesalover $120</button>
<button class="product" onclick="add(220)">Hambreado $220</button>

<div class="total">
Total: $<span id="total">0</span>
</div>

<div class="status">
Estado: <span id="estado">Pendiente</span>
</div>

<br>

<button class="actions" onclick="cobrar('Efectivo')">Efectivo</button>
<button class="actions" onclick="cobrar('Transferencia')">Transferencia</button>
<button class="actions" onclick="reset()">Nueva</button>

<div id="ticket" class="ticket hidden"></div>

</div>

</div>

<script>

let total = 0;
let PASSWORD = "1234"; // ← puedes cambiarla

function login(){

 let p = document.getElementById("pass").value;

 if(p === PASSWORD){
  document.getElementById("login").style.display="none";
  document.getElementById("app").classList.remove("hidden");
 }else{
  alert("Contraseña incorrecta");
 }

}

function add(precio){
 total += precio;
 document.getElementById("total").innerText = total;
}

function cobrar(metodo){

 document.getElementById("estado").innerText = "Pagado";

 let cliente = document.getElementById("cliente").value;

 let ventas = JSON.parse(localStorage.getItem("ventas") || "[]");

 ventas.push({
 cliente: cliente,
 total: total,
 metodo: metodo,
 fecha: new Date().toLocaleDateString()
 });

 localStorage.setItem("ventas", JSON.stringify(ventas));

 mostrarTicket(cliente,metodo,total);

}

function mostrarTicket(cliente,metodo,total){

 let div = document.getElementById("ticket");

 div.innerHTML = `
  <h3>🧾 Ticket</h3>
  Cliente: ${cliente}<br>
  Total: $${total}<br>
  Pago: ${metodo}<br>
  ✅ Gracias por su compra
 `;

 div.classList.remove("hidden");

}

function reset(){
 total = 0;
 document.getElementById("total").innerText = total;
 document.getElementById("estado").innerText = "Pendiente";
 document.getElementById("cliente").value = "";
 document.getElementById("ticket").classList.add("hidden");
}

</script>

</body>
</html>
