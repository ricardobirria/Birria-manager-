<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birria Manager</title>

<style>

body{
 margin:0;
 font-family:Arial, sans-serif;
 background:#2b1d16;
 color:#fff;
}

.header{
 background:#6b2e1a;
 padding:15px;
 text-align:center;
 font-size:24px;
 font-weight:bold;
}

.main{
 display:flex;
 height:calc(100vh - 60px);
}

.left{
 flex:2;
 padding:15px;
}

.right{
 flex:1;
 background:#f4e6d0;
 color:#222;
 padding:15px;
}

.tabs{
 display:flex;
 gap:5px;
 margin-bottom:10px;
}

.tab{
 background:#4a2b20;
 padding:10px 15px;
 border-radius:8px;
 cursor:pointer;
}

.active{
 background:#b5522c;
}

input{
 padding:10px;
 font-size:16px;
 width:60%;
 border-radius:6px;
 border:none;
 margin-bottom:10px;
}

.products{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
}

button{
 padding:20px;
 font-size:18px;
 border:none;
 border-radius:10px;
 cursor:pointer;
}

.taco{background:#e67e22;}
.quesa{background:#27ae60;}
.consome{background:#d35400;}
.combo{background:#8e5a2b;}
.accion{background:#27ae60;color:white;width:100%;margin-top:10px;}
.eliminar{background:#c0392b;color:white;width:100%;margin-top:10px;}
.historial{background:#34495e;color:white;width:100%;margin-top:10px;}

.lista{
 background:white;
 color:black;
 padding:10px;
 border-radius:8px;
 min-height:200px;
}

.total{
 font-size:24px;
 font-weight:bold;
 margin-top:10px;
}

.login{
 position:fixed;
 inset:0;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}

.hidden{display:none;}

</style>

</head>
<body>

<div id="login" class="login">
<h2>🔐 Birria Manager</h2>
<input type="password" id="pass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div id="app" class="hidden">

<div class="header">Cobro Birria</div>

<div class="main">

<div class="left">

<div class="tabs" id="tabs"></div>

<input id="cliente" placeholder="Nombre del cliente">

<div class="products">

<button class="taco" onclick="add('Taco',40)">Taco $40</button>
<button class="quesa" onclick="add('Quesabirria',60)">Quesabirria $60</button>
<button class="consome" onclick="add('Consomé',20)">Consomé $20</button>
<button class="combo" onclick="add('Birriamen',120)">Birriamen $120</button>

<button class="combo" onclick="add('Media Orden',120)">Media Orden $120</button>
<button class="combo" onclick="add('Taquisa',110)">Taquisa $110</button>
<button class="combo" onclick="add('Quesalover',120)">Quesalover $120</button>
<button class="combo" onclick="add('Hambreado',220)">Hambreado $220</button>

</div>

<button onclick="nuevaCuenta()">+ Nueva Cuenta</button>

</div>

<div class="right">

<h3>Pedido</h3>

<div id="lista" class="lista"></div>

<div class="total">
Total: $<span id="total">0</span><br>
Artículos: <span id="articulos">0</span>
</div>

<button class="eliminar" onclick="eliminarCuenta()">Eliminar</button>
<button class="accion" onclick="cobrar()">Cobrar</button>
<button class="historial" onclick="verHistorial()">Ver Ventas del Día</button>

</div>

</div>

</div>

<script>

let PASSWORD="1234";

let cuentas=[];
let actual=null;

function login(){
 if(document.getElementById("pass").value===PASSWORD){
  loginDiv.style.display="none";
  app.classList.remove("hidden");
 }
}

function nuevaCuenta(){

 let nombre=document.getElementById("cliente").value||"Cliente";

 cuentas.push({
  nombre:nombre,
  items:{},
  total:0
 });

 actual=cuentas.length-1;

 renderTabs();
 render();
}

function renderTabs(){

 let html="";

 cuentas.forEach((c,i)=>{
  html+=`<div class="tab ${i===actual?'active':''}" onclick="cambiar(${i})">${c.nombre}</div>`;
 });

 tabs.innerHTML=html;
}

function cambiar(i){
 actual=i;
 document.getElementById("cliente").value=cuentas[i].nombre;
 render();
 renderTabs();
}

function add(nombre,precio){

 if(actual===null) return;

 let c=cuentas[actual];

 if(!c.items[nombre]){
  c.items[nombre]={cantidad:0,precio:precio};
 }

 c.items[nombre].cantidad++;

 c.total+=precio;

 render();
}

function render(){

 if(actual===null) return;

 let c=cuentas[actual];

 cliente.value=c.nombre;

 let html="";
 let totalArt=0;

 for(let k in c.items){

  let item=c.items[k];

  totalArt+=item.cantidad;

  html+=`${item.cantidad} ${k} - $${item.cantidad*item.precio}<br>`;
 }

 lista.innerHTML=html;

 total.innerText=c.total;
 articulos.innerText=totalArt;
}

function eliminarCuenta(){

 if(actual===null) return;

 cuentas.splice(actual,1);

 actual=null;

 renderTabs();
 lista.innerHTML="";
 total.innerText=0;
 articulos.innerText=0;
}

function cobrar(){

 if(actual===null) return;

 let c=cuentas[actual];

 let ventas=JSON.parse(localStorage.getItem("ventas")||"[]");

 ventas.push({
  nombre:c.nombre,
  total:c.total,
  fecha:new Date().toLocaleString()
 });

 localStorage.setItem("ventas",JSON.stringify(ventas));

 eliminarCuenta();
}

function verHistorial(){

 let ventas=JSON.parse(localStorage.getItem("ventas")||"[]");

 let txt="Ventas del día:\n\n";

 ventas.forEach(v=>{
  txt+=`${v.nombre} - $${v.total}\n`;
 });

 alert(txt);
}

</script>

</body>
</html>
